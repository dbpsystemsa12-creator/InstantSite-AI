    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

            const menuBtn = document.getElementById('mobile-menu-btn');
            const menu = document.getElementById('mobile-menu');
            const icon = menuBtn.querySelector('i');
            const links = document.querySelectorAll('.mobile-link');
            
            menuBtn.addEventListener('click', () => {
                const isOpen = !menu.classList.contains('mobile-menu-closed');
                if(isOpen) {
                    menu.classList.add('mobile-menu-closed'); menu.classList.remove('mobile-menu-open'); icon.classList.replace('fa-xmark', 'fa-bars');
                } else {
                    menu.classList.remove('mobile-menu-closed'); menu.classList.add('mobile-menu-open'); icon.classList.replace('fa-bars', 'fa-xmark');
                }
            });
            links.forEach(link => {
                link.addEventListener('click', () => { menu.classList.add('mobile-menu-closed'); menu.classList.remove('mobile-menu-open'); icon.classList.replace('fa-xmark', 'fa-bars'); });
            });
        });
    <\/script>
    <script>
        document.querySelectorAll('h1, h2, h3, h4, p, span, li, div.font-display').forEach(el => {
            if (el.closest('nav') || el.closest('button') || el.closest('a')) return;
            el.setAttribute('contenteditable', 'true');
            el.style.outline = 'none';
            el.addEventListener('mouseenter', () => el.style.boxShadow = '0 0 0 2px rgba(79, 70, 229, 0.5)');
            el.addEventListener('mouseleave', () => el.style.boxShadow = 'none');
            el.addEventListener('input', () => {
                const cleanDoc = document.documentElement.cloneNode(true);
                cleanDoc.querySelectorAll('[contenteditable]').forEach(node => {
                    node.removeAttribute('contenteditable');
                    node.style.boxShadow = '';
                });
                window.parent.postMessage({ type: 'LIVE_EDIT_UPDATE', html: '<!DOCTYPE html>\\n' + cleanDoc.outerHTML }, '*');
            });
        });
    <\/script>
</body>
</html>`;
        };

            const [previewMode, setPreviewMode] = useState('desktop');
            const [toast, setToast] = useState(null);
            
            const [loadingLogs, setLoadingLogs] = useState([]);
            const [loadingProgress, setLoadingProgress] = useState(0);
            
            // Firebase & LocalStorage State
            const [users, setUsers] = useState([]);
            const [requests, setRequests] = useState([]);
            const [currentUser, setCurrentUser] = useState(null);
            
            const isAdmin = currentUser && currentUser.phone === '9827700975'; // Your default admin number
            const isPro = currentUser && currentUser.isPro;

            // Auth State
            const [authMode, setAuthMode] = useState('signup');
            const [authForm, setAuthForm] = useState({ name: '', phone: '', password: '' });
            const [paymentModalOpen, setPaymentModalOpen] = useState(false);

            // Templates & Colors
            const freeTemplates = ['minimal', 'bento'];
            const proTemplates = ['dark', 'corporate', 'creative', 'neon', 'midnight', 'matrix', 'glassmorphism', 'brutalism'];
            const presetColors = ['#4f46e5', '#10b981', '#f59e0b', '#171717']; 
            const proColors = ['#e11d48', '#d946ef', '#0ea5e9', '#84cc16']; 

            const [form, setForm] = useState({
                name: '', type: '', city: '', phone: '', address: '', description: '', services: '', seo: '', color: '#4f46e5', template: 'minimal'
            });

            // Firebase Real-time Sync & Persistent Login Logic
            useEffect(() => {
                const unsubscribeUsers = db.collection('users').onSnapshot(snapshot => {
                    const usersData = snapshot.docs.map(doc => doc.data());
                    setUsers(usersData);
                    
                    // Keep current user state in sync if admin changes PRO status from another browser
                    const storedUser = localStorage.getItem('dbp-current-user');
                    if (storedUser) {
                        const parsedUser = JSON.parse(storedUser);
                        const updatedUser = usersData.find(u => u.phone === parsedUser.phone);
                        if (updatedUser) {
                            setCurrentUser(updatedUser);
                            localStorage.setItem('dbp-current-user', JSON.stringify(updatedUser));
                        }
                    }
                });

                const unsubscribeRequests = db.collection('requests').onSnapshot(snapshot => {
                    setRequests(snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() })));
                });

                // INITIAL LOGIN CHECK
                const storedUser = localStorage.getItem('dbp-current-user');
                if (storedUser) {
                    setCurrentUser(JSON.parse(storedUser));
                    setView('builder');
                }

                return () => { unsubscribeUsers(); unsubscribeRequests(); };
            }, []);

            // Live Edit Listener
            useEffect(() => {
                const handleIframeMessage = (event) => {
                    if (event.data && event.data.type === 'LIVE_EDIT_UPDATE') {
                        setSiteCode(event.data.html);
                    }
                };
                window.addEventListener('message', handleIframeMessage);
                return () => window.removeEventListener('message', handleIframeMessage);
            }, []);

            useEffect(() => {
                const splash = document.getElementById('dbp-splash');
                const text = document.getElementById('splash-text');
                if(splash && text) {
                    setTimeout(() => text.innerHTML = "INSTANTSITE AI", 1000);
                    setTimeout(() => { splash.style.opacity = '0'; setTimeout(() => splash.style.display = 'none', 1000); }, 2500);
                }
            }, []);

            const showToast = (msg, type='success') => { setToast({msg, type}); setTimeout(() => setToast(null), 3500); };

            const handleAuth = async () => {
                if (authMode === 'signup') {
                    if (!authForm.name || !authForm.phone || !authForm.password) return showToast("All fields required", "error");
                    
                    const docRef = db.collection('users').doc(authForm.phone);
                    const docSnap = await docRef.get();
                    if (docSnap.exists) return showToast("Phone already registered!", "error");

                    const newUser = { name: authForm.name, phone: authForm.phone, password: authForm.password, isPro: false, joined: new Date().toLocaleDateString() };
                    
                    await docRef.set(newUser);
                    setCurrentUser(newUser);
                    localStorage.setItem('dbp-current-user', JSON.stringify(newUser));
                    setForm(prev => ({...prev, name: newUser.name, phone: newUser.phone}));
                    setView('builder');
                    showToast(`Account created! Welcome, ${newUser.name}.`, "success");
                } else {
                    if (!authForm.phone || !authForm.password) return showToast("Credentials required", "error");
                    
                    const docRef = db.collection('users').doc(authForm.phone);
                    const docSnap = await docRef.get();
                    
                    if (docSnap.exists && docSnap.data().password === authForm.password) {
                        const user = docSnap.data();
                        setCurrentUser(user);
                        localStorage.setItem('dbp-current-user', JSON.stringify(user));
                        setForm(prev => ({...prev, name: user.name, phone: user.phone}));
                        setView('builder');
                        showToast(`Welcome back, ${user.name}!`, "success");
                    } else { 
                        showToast("Invalid credentials.", "error"); 
                    }
                }
            };

            const handleTemplateSelect = (tmpl) => {
                if (!isPro && proTemplates.includes(tmpl)) return showToast("Unlock PRO to use Premium Templates!", "error");
                setForm({...form, template: tmpl});
            };
            const handleColorSelect = (c) => {
                if (!isPro && !presetColors.includes(c)) return showToast("Unlock PRO for premium colors!", "error");
                setForm({...form, color: c});
            };

            const handleGenerate = () => {
                if(!form.name || !form.type || !form.city || !form.phone) return showToast("Please fill all required details (marked with *).", "error");
                setView('generating'); setLoadingLogs([]); setLoadingProgress(0);
                const logs = [
                    `root@dbp-engine:~$ ./build --type="${form.type}"`,
                    `[OK] Auth Verified: ${isPro ? 'PRO' : 'FREE'} Tier.`,
                    `> fetching business_data: "${form.name.toUpperCase()}"`,
                    `> synthesizing smart_grammar.js for [${form.type.toUpperCase()}]`,
                    `> generating pure CSS architecture for extreme performance...`,
                    isPro && form.seo ? `> [PRO] injecting custom SEO tags...` : `> bypassing custom SEO (Free Tier)...`,
                    `> rendering DOM elements for [Template: ${form.template}]`,
                    isPro ? `> [PRO] bypassing watermark payload...` : `> injecting standard watermark...`,
                    `[OK] Compile complete. Launching viewport.`
                ];
                let i = 0;
                const logInterval = setInterval(() => {
                    setLoadingLogs(prev => [...prev, logs[i]]);
                    setLoadingProgress(Math.round(((i + 1) / logs.length) * 100));
                    i++;
                    if(i >= logs.length) {
                        clearInterval(logInterval);
                        setSiteCode(generateSiteHTML(form, isPro));
                        setTimeout(() => setView('preview'), 800); 
                    }
                }, 350); 
            };

            const downloadHTML = () => {
                const blob = new Blob([siteCode], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${form.name.replace(/\s+/g, '_').toLowerCase()}_site.html`;
                a.click();
                showToast("Code exported successfully!");
            };

            const handlePaymentInit = () => {
                if(!currentUser) return setView('auth');
                if(isPro) return showToast("You already have an active PRO subscription!", "info");
                setPaymentModalOpen(true);
            };

            const confirmPaymentSent = async () => {
                const newReq = { id: Date.now(), user: currentUser.name, phone: currentUser.phone, type: 'PRO Upgrade (GPay)', status: 'Pending Verification', date: new Date().toLocaleDateString() };
                await db.collection('requests').add(newReq);
                setPaymentModalOpen(false);
                showToast("Screenshot sent! We will activate your PRO status shortly.", "success");
            };

            const adminTogglePro = async (phone) => {
                const userRef = db.collection('users').doc(phone);

                if(userSnap.exists) {
                    await userRef.update({ isPro: !userSnap.data().isPro });
                    showToast("User PRO status updated.", "success");
                }
            };
            
            const adminDeleteUser = async (phone) => {
                if(confirm("Are you sure you want to completely delete this user?")) {
                    await db.collection('users').doc(phone).delete();
                    showToast("User deleted from database.", "info");
                }
            };

            const terminalEndRef = useRef(null);
            useEffect(() => { if(terminalEndRef.current) terminalEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [loadingLogs]);

            return (
                <div className="flex-1 flex flex-col relative z-10 h-screen overflow-hidden">
                    
                    {/* Background Grid Pattern */}

                    </div>

                    {toast && (

                                <div className="bg-[#111] border border-gray-800 rounded-xl p-6 text-center mb-6">
                                    <div className="text-sm text-gray-500 uppercase tracking-widest mb-2 font-bold">Amount Due</div>
                                    <div className="text-4xl font-black text-white mb-4">₹999<span className="text-lg text-gray-500">/yr</span></div>
                                    <p className="text-sm text-gray-300">Pay securely via Google Pay (GPay) to:</p>
                                    <div className="text-2xl font-mono text-brand-400 font-bold mt-2 select-all bg-brand-500/10 py-2 rounded-lg border border-brand-500/20">8209772163</div>
                                </div>
                                <ul className="text-sm text-gray-400 space-y-2 mb-8 font-mono">
                                    <li>> 1. Send ₹999 on GPay.</li>
                                    <li>> 2. Screenshot the transaction.</li>
                                    <li>> 3. WhatsApp it to us to activate.</li>
                                </ul>
                                <div className="flex flex-col gap-3">

                                                <button onClick={() => handleTemplateSelect('glassmorphism')} className={`relative p-3 rounded-xl border ${form.template === 'glassmorphism' ? 'border-brand-500 bg-brand-500/10' : 'border-white/10 bg-white/5 hover:bg-white/10'} transition flex flex-col items-center gap-2 ${!isPro && 'pro-locked'}`}>
                                                    {!isPro && <i className="fa-solid fa-lock pro-locked-icon"></i>}
                                                    <div className="text-xl mb-1 text-white/50"><i className="fa-regular fa-clone"></i></div><span className="text-[10px] font-bold text-white uppercase tracking-wide">Glass</span>
                                                </button>
                                                <button onClick={() => handleTemplateSelect('brutalism')} className={`relative p-3 rounded-xl border ${form.template === 'brutalism' ? 'border-brand-500 bg-brand-500/10' : 'border-white/10 bg-white/5 hover:bg-white/10'} transition flex flex-col items-center gap-2 ${!isPro && 'pro-locked'}`}>
                                                    {!isPro && <i className="fa-solid fa-lock pro-locked-icon"></i>}
                                                    <div className="text-xl mb-1 text-white font-black">B</div><span className="text-[10px] font-bold text-white uppercase tracking-wide">Brutalism</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={handleGenerate} className="w-full mt-10 text-white font-display font-black text-2xl py-5 rounded-2xl btn-god-mode flex justify-center items-center gap-4">
                                        <i className="fa-solid fa-wand-magic-sparkles"></i> START BUILDING
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* GENERATING SCREEN (Hacker Terminal) */}
                        {view === 'generating' && (
                            <div className="flex-1 flex flex-col items-center justify-center p-6 animate-fade-in">
                                <div className="w-full max-w-3xl terminal-window border border-slate-800">
                                    <div className="bg-[#111] border-b border-slate-800 p-3 flex items-center gap-3">
                                        <div className="flex gap-2"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-green-500"></div></div>
                                        <div className="text-xs text-gray-500 font-mono">root@dbp-neural-engine:~</div>
                                    </div>
                                    <div className="p-6 h-[400px] overflow-y-auto space-y-2 hacker-text">
                                        {loadingLogs.map((log, index) => (<div key={index}>{log}</div>))}
                                        <div ref={terminalEndRef} className="animate-pulse inline-block">█</div>
                                    </div>
                                </div>
                                <div className="w-full max-w-3xl mt-8">
                                    <div className="flex justify-between text-xs font-mono font-bold text-hacker mb-3 tracking-widest">
                                        <span>SYSTEM COMPILING</span><span>{loadingProgress}%</span>
                                    </div>
                                    <div className="w-full bg-[#111] border border-slate-800 rounded-none h-2 overflow-hidden">
                                        <div className="bg-hacker h-full shadow-[0_0_15px_#10b981] transition-all duration-200 ease-out" style={{width: `${loadingProgress}%`}}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PREVIEW SCREEN */}
                        {view === 'preview' && (
                            <div className="flex-1 flex flex-col h-[calc(100vh-80px)] animate-fade-up">
                                <div className="glass-panel border-b border-white/5 p-4 px-6 flex flex-wrap gap-4 items-center justify-between z-10 flex-shrink-0">
                                    <div className="flex items-center bg-dark-900 rounded-xl p-1 border border-white/10 shadow-inner">
                                        <button onClick={() => setPreviewMode('desktop')} className={`px-5 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2 ${previewMode === 'desktop' ? 'bg-slate-800 text-white shadow-md border border-white/5' : 'text-slate-500 hover:text-slate-300'}`}><i className="fa-solid fa-desktop"></i> Desktop</button>
                                        <button onClick={() => setPreviewMode('mobile')} className={`px-5 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2 ${previewMode === 'mobile' ? 'bg-slate-800 text-white shadow-md border border-white/5' : 'text-slate-500 hover:text-slate-300'}`}><i className="fa-solid fa-mobile-screen"></i> Mobile</button>
                                    </div>
                                    <div className="text-center hidden md:block">
                                        <span className="text-xs font-mono font-bold text-green-400 bg-green-400/10 px-4 py-1.5 rounded-full border border-green-400/20 shadow-[0_0_10px_rgba(74,222,128,0.2)]"><i className="fa-solid fa-check-circle mr-1"></i> Ready for Production</span>
                                    </div>
                                    <div className="flex gap-4 items-center">
                                        <button onClick={() => setView('builder')} className="text-slate-400 hover:text-white px-2 text-sm font-medium transition flex items-center gap-2"><i className="fa-solid fa-pen-to-square"></i> Edit Details</button>
                                        <button onClick={() => setView('pricing')} className="bg-white text-black px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-gray-200 transition shadow-[0_0_20px_rgba(255,255,255,0.15)] flex items-center gap-2 transform active:scale-95">Next Steps <i className="fa-solid fa-arrow-right"></i></button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 flex justify-center items-center p-4 lg:p-10 overflow-hidden bg-grid-pattern relative">
                                    <div className="absolute top-4 right-4 z-50 bg-black/60 backdrop-blur-md border border-brand-500/30 text-white text-xs px-4 py-2 rounded-full shadow-[0_0_10px_rgba(79,70,229,0.2)] flex items-center gap-2 animate-bounce">
                                        <i className="fa-solid fa-pen-nib text-brand-400"></i> Click any text below to edit live!
                                    </div>
                                    <div className={`transition-all duration-700 ease-[cubic-bezier(0.16,1,0.3,1)] ${previewMode === 'mobile' ? 'device-mobile' : 'device-desktop'}`}>
                                        {previewMode === 'desktop' && (
                                            <div className="browser-bar">
                                                <div className="flex gap-2"><div className="browser-dot bg-[#ed6a5e] w-3 h-3 rounded-full"></div><div className="browser-dot bg-[#f5bf4f] w-3 h-3 rounded-full"></div><div className="browser-dot bg-[#61c554] w-3 h-3 rounded-full"></div></div>
                                                <div className="flex-1 flex justify-center">
                                                    <div className="bg-dark-950 border border-white/5 text-[10px] font-mono text-slate-500 px-6 py-1.5 rounded-lg w-1/2 max-w-sm text-center flex items-center justify-center gap-2 shadow-inner"><i className="fa-solid fa-lock text-brand-400"></i>{form.name.toLowerCase().replace(/\s+/g, '')}.dbpsites.in</div>
                                                </div>
                                            </div>
                                        )}
                                        <iframe srcDoc={siteCode} className={`w-full h-full flex-1 border-none bg-white ${previewMode === 'mobile' ? 'rounded-[30px]' : ''}`}></iframe>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PRICING SCREEN */}
                        {view === 'pricing' && (
                            <div className="flex-1 py-16 px-6 animate-fade-up overflow-y-auto">
                                <div className="text-center max-w-3xl mx-auto mb-16">
                                    <div className="inline-block bg-brand-500/10 text-brand-400 px-4 py-1.5 rounded-full text-xs font-bold mb-4 border border-brand-500/20">Launch Your Site Today</div>
                                    <h2 className="font-display text-4xl md:text-6xl font-black mb-4 text-white tracking-tight">Your code is ready.</h2>
                                    <p className="text-slate-400 text-lg font-light">Download the enterprise-grade source code for free, or upgrade to PRO to remove watermarks and unlock all 10 templates.</p>
                                </div>

                                <div className="max-w-4xl mx-auto grid md:grid-cols-2 gap-8 items-start">
                                    {/* Free Tier */}
                                    <div className="glass-panel rounded-[2rem] p-10 border border-white/10 hover:border-white/20 transition duration-300">
                                        <h3 className="font-display font-bold text-2xl mb-2 text-white">Starter Code</h3>
                                        <p className="text-slate-400 text-sm mb-8">Own your code completely.</p>
                                        <div className="flex items-end gap-1 mb-8"><span className="text-5xl font-display font-black text-white">₹0</span></div>
                                        <ul className="space-y-4 text-sm text-slate-300 mb-10 font-medium border-t border-white/5 pt-8">
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-code text-brand-400 w-4"></i> Download HTML/CSS file</li>
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-copyright text-red-400 w-4"></i> Forced DBP Watermark</li>
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-lock text-red-400 w-4"></i> 8 Premium Templates Locked</li>
                                        </ul>
                                        <button onClick={downloadHTML} className="w-full py-4 rounded-xl font-bold text-sm bg-white/5 text-white hover:bg-white/10 border border-white/10 transition flex justify-center items-center gap-2"><i className="fa-solid fa-download"></i> Export Free</button>
                                    </div>

                                    {/* Pro Tier (Highlight) */}
                                    <div className="bg-gradient-to-br from-brand-600 to-indigo-900 rounded-[2rem] p-10 border border-gold-400 shadow-[0_0_50px_rgba(251,191,36,0.2)] transform md:-translate-y-4 relative z-10">
                                        <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-gold-500 text-black text-xs font-black px-5 py-1.5 rounded-full uppercase tracking-widest shadow-xl">DBP Pro Access</div>
                                        <h3 className="font-display font-bold text-2xl mb-2 text-white">Pro Editor</h3>
                                        <p className="text-brand-200 text-sm mb-8">No watermark. Full feature unlock.</p>
                                        <div className="flex items-end gap-1 mb-8"><span className="text-5xl font-display font-black text-white">₹999</span><span className="text-brand-300 font-semibold mb-1">/yr</span></div>
                                        <ul className="space-y-4 text-sm text-white mb-10 font-medium border-t border-white/20 pt-8">
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-unlock text-gold-400 w-4"></i> All 10 Templates Unlocked</li>
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-droplet-slash text-gold-400 w-4"></i> Watermark Completely Removed</li>
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-chart-line text-gold-400 w-4"></i> Custom SEO & Services Engine</li>
                                        </ul>
                                        {isPro ? (
                                            <button onClick={downloadHTML} className="w-full py-4 rounded-xl font-black text-sm bg-gold-500 border border-gold-400 text-black hover:bg-gold-400 transition flex justify-center items-center gap-2 shadow-[0_0_15px_rgba(251,191,36,0.3)]"><i className="fa-solid fa-download"></i> Export Pro Code</button>
                                        ) : (
                                            <button onClick={handlePaymentInit} className="w-full py-4 rounded-xl font-black text-sm bg-white text-brand-600 hover:bg-gray-50 transition shadow-xl transform active:scale-95 flex justify-center items-center gap-2">
                                                <i className="fa-brands fa-google-pay text-lg"></i> Get PRO via GPay
                                            </button>
                                        )}
                                    </div>
                                </div>
                                <div className="text-center mt-12"><button onClick={() => setView('preview')} className="text-slate-500 hover:text-white font-medium flex items-center gap-2 mx-auto transition"><i className="fa-solid fa-arrow-left"></i> Return to Preview</button></div>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
