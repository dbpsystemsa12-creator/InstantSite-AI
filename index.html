                if (!isPro && ['dark', 'corporate', 'creative', 'neon', 'midnight', 'matrix', 'glassmorphism', 'brutalism'].includes(tmpl)) return showToast("Unlock PRO to use Premium Templates!", "error");
                setForm({...form, template: tmpl});
            };
            const handleColorSelect = (c) => {
                if (!isPro && !presetColors.includes(c)) return showToast("Unlock PRO for premium colors!", "error");
                setForm({...form, color: c});
            };

            const handleGenerate = () => {
                if(!currentUser) {
                    showToast("Please authenticate to securely compile your site.", "info");
                    setView('auth');
                    window.scrollTo({top: 0, behavior: 'smooth'});
                    return;
                }

                if(!form.name || !form.type || !form.city || !form.phone) return showToast("Please fill all required details (marked with *).", "error");
                if(form.hasPricing === 'yes' && !form.pricingDetails) return showToast("Please provide pricing details, or select 'No' to skip.", "error");
                
                setView('generating'); setLoadingLogs([]); setLoadingProgress(0);
                window.scrollTo({top: 0, behavior: 'smooth'});
                
                const logs = [
                    `root@dbp-engine:~$ ./build --type="${form.type}"`,
                    `[OK] Auth Verified: ${isPro ? 'PRO' : 'FREE'} Tier.`,
                    `> fetching business_data: "${form.name.toUpperCase()}"`,
                    form.hasPricing === 'yes' ? `> injecting pricing strategy: "${form.pricingDetails}"` : `> bypassing pricing strategy module...`,
                    `> synthesizing smart_grammar.js for [${form.type.toUpperCase()}]`,
                    `> generating pure CSS architecture for extreme performance...`,
                    isPro && form.seo ? `> [PRO] injecting custom SEO tags...` : `> bypassing custom SEO (Free Tier)...`,
                    `> rendering DOM elements for [Template: ${form.template}]`,
                    isPro ? `> [PRO] bypassing watermark payload...` : `> injecting standard watermark...`,
                    `[OK] Compile complete. Launching viewport.`
                ];
                let i = 0;
                const logInterval = setInterval(() => {
                    setLoadingLogs(prev => [...prev, logs[i]]);
                    setLoadingProgress(Math.round(((i + 1) / logs.length) * 100));
                    i++;
                    if(i >= logs.length) {
                        clearInterval(logInterval);
                        const finalCode = generateSiteHTML(form, isPro);
                        setSiteCode(finalCode);
                        siteCodeRef.current = finalCode; 
                        setTimeout(() => setView('preview'), 800); 
                    }
                }, 350); 
            };

            const saveProjectToCloud = async () => {
                if(!currentUser) return showToast("You must be logged in to save.", "error");
                try {
                    await db.collection('sites').add({
                        phone: currentUser.phone,
                        name: form.name || 'Untitled Site',
                        html: siteCodeRef.current,
                        date: new Date().toLocaleString()
                    });
                    showToast("Project saved to your Dashboard!", "success");
                } catch(err) { showToast("Failed to save project to cloud.", "error"); }
            };

            const loadProject = (htmlCode, projectName) => {
                setSiteCode(htmlCode);
                siteCodeRef.current = htmlCode;
                setForm(prev => ({...prev, name: projectName}));
                setView('preview');
                showToast(`Loaded ${projectName}`, "success");
            };
            
            const deleteProject = async (docId) => {
                if(confirm("Are you sure you want to delete this project?")) {
                    try {
                        await db.collection('sites').doc(docId).delete();
                        showToast("Project deleted.", "info");
                    } catch(err) { showToast("Error deleting project.", "error"); }
                }
            };

            const downloadHTML = () => {
                let finalExportCode = siteCodeRef.current;
                finalExportCode = finalExportCode.replace(/<script id="dbp-live-editor">[\s\S]*?<\/script>/gi, '');
                finalExportCode = finalExportCode.replace(/<script id="dbp-preview-helper">[\s\S]*?<\/script>/gi, '');
                finalExportCode = finalExportCode.replace(/ contenteditable="true"/gi, '');
                finalExportCode = finalExportCode.replace(/ style="outline: none;"/gi, '');

                const blob = new Blob([finalExportCode], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${form.name.replace(/\s+/g, '_').toLowerCase()}_site.html`;
                a.click();
                showToast("Clean code exported successfully!");
            };

            const handlePaymentInit = () => {
                if(!currentUser) return setView('auth');
                if(isPro) return showToast("You already have an active PRO subscription!", "info");
                
                const options = {
                    "key": "rzp_test_DBPInstantSiteKey", 
                    "amount": "99900", 
                    "currency": "INR",
                    "name": "DBP InstantSite AI",
                    "description": "Pro Editor Subscription",
                    "image": "https://cdn-icons-png.flaticon.com/512/3260/3260838.png",
                    "handler": async function (response) {
                        try {
                            setToast({msg: "Processing payment...", type: "info"});
                            await db.collection('users').doc(currentUser.phone).update({ isPro: true });
                            showToast("Payment Successful! PRO features unlocked.", "success");
                            await db.collection('requests').add({ id: response.razorpay_payment_id, user: currentUser.name, phone: currentUser.phone, type: 'Razorpay Auto-Upgrade', status: 'Success', date: new Date().toLocaleDateString() });
                        } catch(err) { showToast("Database error post-payment. Contact admin.", "error"); }
                    },
                    "prefill": { "name": currentUser.name, "contact": currentUser.phone },
                    "theme": { "color": "#8b5cf6" }
                };
                
                if (window.Razorpay) {
                    const rzp1 = new window.Razorpay(options);
                    rzp1.open();

                    showToast("Payment gateway failed to load. Check connection.", "error");
                }

                try {
                    const userRef = db.collection('users').doc(phone);

                    if(userSnap.exists) {
                        await userRef.update({ isPro: !userSnap.data().isPro });
                        showToast("User PRO status updated.", "success");
                    }
                } catch (err) { showToast("Error updating user.", "error"); }
            };
            
            const adminDeleteUser = async (phone) => {
                if(confirm("Are you sure you want to delete this user?")) {
                    try {
                        await db.collection('users').doc(phone).delete();
                        showToast("User deleted.", "info");
                    } catch (err) { showToast("Error deleting user.", "error"); }

                                    <div className="hero-glow animate-glow-pulse"></div>

                                        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-brand-500/10 text-brand-400 text-xs font-bold mb-8 border border-brand-500/20 shadow-[0_0_15px_rgba(139,92,246,0.15)]">
                                            <span className="w-2 h-2 rounded-full bg-brand-400 animate-pulse"></span>
                                            V7 Engine: Pure CSS Generation
                                        </div>
                                        
                                        <h1 className="font-display text-5xl md:text-7xl lg:text-[6.5rem] font-black mb-8 tracking-tighter text-white leading-[1.05] drop-shadow-2xl">
                                            From Vision to Enterprise.<br/>
                                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-indigo-400 italic font-semibold">In 5 Seconds.</span>
                                        </h1>
                                        
                                        <p className="text-lg md:text-xl text-gray-400 mb-12 max-w-2xl mx-auto font-light leading-relaxed">
                                            Stop burning capital on slow development agencies. InstantSite AI harnesses advanced CSS architectures to deploy elite, production-ready websites instantly.
                                        </p>
                                        
                                        <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                                            <button onClick={handleGetStarted} className="btn-shine px-12 py-5 rounded-2xl text-white font-bold text-sm tracking-widest shadow-2xl flex items-center justify-center gap-3">
                                                GET STARTED <i className="fa-solid fa-arrow-down"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* CINEMATIC ABOUT SECTIONS */}
                                <div className="max-w-6xl mx-auto px-6 py-10 z-10 relative">
                                    <div className="grid md:grid-cols-2 gap-8">
                                        <div className="premium-panel p-10 relative overflow-hidden group hover:border-brand-500/50 transition duration-500">
                                            <div className="absolute -right-10 -top-10 w-40 h-40 bg-brand-500/10 blur-[50px] rounded-full group-hover:bg-brand-500/20 transition duration-700"></div>
                                            <div className="w-14 h-14 bg-black border border-white/10 rounded-2xl flex items-center justify-center mb-6 shadow-inner relative z-10">
                                                <i className="fa-solid fa-bolt text-2xl text-brand-400"></i>
                                            </div>
                                            <h3 className="font-display font-bold text-2xl text-white mb-4 relative z-10">The InstantSite Engine</h3>
                                            <p className="text-gray-400 leading-relaxed font-light relative z-10">A proprietary AI engine designed to eliminate the friction of web development. By leveraging pre-compiled, pure-CSS architectures, we guarantee perfect lighthouse scores, flawless mobile responsiveness, and zero-dependency deployments right out of the box.</p>
                                        </div>
                                        
                                        <div className="premium-panel p-10 relative overflow-hidden group hover:border-indigo-500/50 transition duration-500">
                                            <div className="absolute -left-10 -bottom-10 w-40 h-40 bg-indigo-500/10 blur-[50px] rounded-full group-hover:bg-indigo-500/20 transition duration-700"></div>
                                            <div className="w-14 h-14 bg-black border border-white/10 rounded-2xl flex items-center justify-center mb-6 shadow-inner relative z-10">
                                                <i className="fa-solid fa-microchip text-2xl text-indigo-400"></i>
                                            </div>
                                            <h3 className="font-display font-bold text-2xl text-white mb-4 relative z-10">About DBP Systems</h3>
                                            <p className="text-gray-400 leading-relaxed font-light relative z-10">DBP Systems is a forward-thinking technology hub specializing in next-generation web platforms, hardware automation, and robotics interfaces. We build elite, high-performance tools engineered specifically for the modern entrepreneur and visionary.</p>
                                        </div>
                                    </div>
                                </div>

                                {/* HIDDEN BUILDER SECTION (Revealed on click) */}
                                {isBuilderRevealed && (
                                    <div id="builder-section" className="flex flex-col items-center justify-start p-6 py-20 max-w-6xl mx-auto w-full animate-fade-up">
                                        <div className="text-center max-w-4xl mb-14 border-t border-white/5 pt-20">
                                            <h2 className="font-display text-4xl md:text-5xl font-bold mb-4 tracking-tight text-white">
                                                Configure Architecture.
                                            </h2>
                                            <p className="text-gray-400 text-lg font-light">Input structural details below to initialize the CSS generation engine.</p>
                                        </div>

                                        <div className="w-full flex flex-col lg:flex-row gap-8 relative z-10">
                                            {/* Core Data Panel */}
                                            <div className="flex-1 premium-panel p-8 md:p-10">
                                                <h2 className="font-display font-bold text-xl mb-8 flex items-center gap-4 text-white border-b border-white/10 pb-6">
                                                    <div className="w-8 h-8 rounded-full bg-brand-500/20 text-brand-400 border border-brand-500/30 flex items-center justify-center text-sm font-bold shadow-inner">1</div>

                                                <div className="space-y-6">
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Business Name *</label>
                                                        <div className="input-wrapper">
                                                            <i className="fa-solid fa-building input-icon"></i>
                                                            <input type="text" placeholder="e.g. DBP Electronics" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="input-glass"/>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Category *</label>
                                                            <div className="input-wrapper">
                                                                <i className="fa-solid fa-tags input-icon"></i>
                                                                <input type="text" placeholder="e.g. Repair Shop" value={form.type} onChange={e => setForm({...form, type: e.target.value})} className="input-glass"/>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">City *</label>
                                                            <div className="input-wrapper">
                                                                <i className="fa-solid fa-location-dot input-icon"></i>
                                                                <input type="text" placeholder="e.g. Patna" value={form.city} onChange={e => setForm({...form, city: e.target.value})} className="input-glass"/>
                                                            </div>

                                                    <div className="grid grid-cols-2 gap-4">

                                                            <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Pricing Section?</label>
                                                            <div className="input-wrapper">
                                                                <select value={form.hasPricing} onChange={e => setForm({...form, hasPricing: e.target.value})} className="input-glass">
                                                                    <option value="no">Disable</option>
                                                                    <option value="yes">Enable Pricing</option>
                                                                </select>
                                                                <i className="fa-solid fa-chevron-down absolute right-4 text-gray-500 pointer-events-none text-xs"></i>
                                                            </div>
                                                        </div>
                                                        {form.hasPricing === 'yes' && (
                                                            <div className="col-span-2 sm:col-span-1 animate-fade-in">
                                                                <label className="block text-xs font-bold text-brand-400 mb-2 uppercase tracking-widest">Pricing Info *</label>
                                                                <div className="input-wrapper">
                                                                    <i className="fa-solid fa-indian-rupee-sign input-icon text-brand-400"></i>
                                                                    <input type="text" placeholder="e.g. Starts at ₹499" value={form.pricingDetails} onChange={e => setForm({...form, pricingDetails: e.target.value})} className="input-glass border-brand-500/30 focus:border-brand-500"/>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>

                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">WhatsApp No. *</label>
                                                        <div className="input-wrapper">
                                                            <i className="fa-brands fa-whatsapp input-icon"></i>
                                                            <input type="tel" placeholder="e.g. 9827700975" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} className="input-glass"/>
                                                        </div>

                                            {/* AI Tuning Panel */}
                                            <div className="flex-1 premium-panel p-8 md:p-10 flex flex-col relative overflow-hidden">
                                                <div className="absolute top-0 right-0 p-8 opacity-[0.02]"><i className="fa-solid fa-microchip text-[12rem]"></i></div>
                                                <h2 className="font-display font-bold text-xl mb-8 flex items-center gap-4 text-white border-b border-white/10 pb-6 relative z-10">
                                                    <div className="w-8 h-8 rounded-full bg-black border border-white/10 flex items-center justify-center text-sm font-bold shadow-inner text-gray-500">2</div> 
                                                    AI Tuning
                                                </h2>
                                                <div className="space-y-6 flex-1 relative z-10">
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Custom Description</label>
                                                        <div className="input-wrapper items-start">
                                                            <i className="fa-solid fa-pen-nib input-icon textarea-icon"></i>
                                                            <textarea placeholder="Describe unique features. AI will rewrite into professional copy..." value={form.description} onChange={e => setForm({...form, description: e.target.value})} className="input-glass h-24 resize-none"></textarea>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="space-y-6 border-t border-white/5 pt-6">
                                                        <div>
                                                            <label className="flex justify-between text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest"><span>Specific Services (CSV)</span>{!isPro && <span className="pro-badge"><i className="fa-solid fa-lock text-[8px] mr-1"></i>PRO</span>}</label>
                                                            <div className="input-wrapper items-start">

                                                                <textarea placeholder={isPro ? "e.g. Screen Repair, Data Recovery" : "Locked in Free Tier"} value={form.services} onChange={e => setForm({...form, services: e.target.value})} disabled={!isPro} className={`input-glass h-16 resize-none ${!isPro && 'bg-black/50 border-white/5'}`}></textarea>
                                                            </div>
                                                        </div>
                                                        
                                                        <div>
                                                            <label className="flex justify-between text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest"><span>SEO Meta Tags</span>{!isPro && <span className="pro-badge"><i className="fa-solid fa-lock text-[8px] mr-1"></i>PRO</span>}</label>
                                                            <div className="input-wrapper">
                                                                <i className="fa-solid fa-magnifying-glass input-icon"></i>
                                                                <input type="text" placeholder={isPro ? "e.g. best repair patna, quick fix" : "Locked in Free Tier"} value={form.seo} onChange={e => setForm({...form, seo: e.target.value})} disabled={!isPro} className={`input-glass ${!isPro && 'bg-black/50 border-white/5'}`}/>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        {/* 10 Template Design Matrix */}
                                        <div className="w-full premium-panel p-8 md:p-10 mt-8 relative z-10">

                                                    <div>
                                                        <div className="font-bold text-white text-lg flex items-center gap-3">{u.name} {u.isPro && <span className="pro-badge text-[8px]">PRO</span>}</div>
                                                        <div className="text-xs text-gray-500 font-mono mt-2"><i className="fa-solid fa-phone text-[10px] mr-1"></i> {u.phone} <span className="mx-2">•</span> {u.joined}</div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => adminTogglePro(u.phone)} className={`px-4 py-2 rounded-lg text-xs font-bold tracking-widest transition ${u.isPro ? 'bg-orange-500/10 text-orange-400 border border-orange-500/20 hover:bg-orange-500/20' : 'bg-brand-500/10 text-brand-400 border border-brand-500/20 hover:bg-brand-500/20'}`}>
                                                            {u.isPro ? 'REVOKE' : 'GRANT'}
                                                        </button>
                                                        <button onClick={() => adminDeleteUser(u.phone)} className="px-4 py-2 bg-red-500/10 text-red-500 rounded-lg text-xs font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition"><i className="fa-solid fa-trash"></i></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="premium-panel p-8">
                                        <h3 className="font-display font-bold text-xl text-white mb-6 flex items-center gap-3"><i className="fa-solid fa-server text-brand-400"></i> Transaction Logs</h3>
                                        <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                                            {requests.length === 0 ? <p className="text-gray-500 text-sm italic">No recent transactions.</p> : requests.slice().reverse().map(r => (
                                                <div key={r.firebaseId} className="bg-black/50 p-5 rounded-2xl border border-white/5 flex flex-col gap-3">
                                                    <div className="flex justify-between items-center"><span className="text-xs font-mono text-gray-500">ID: {r.id}</span><span className="text-[10px] bg-green-500/10 text-green-400 border border-green-500/20 px-2 py-1 rounded font-bold uppercase tracking-widest">{r.status}</span></div>
                                                    <div className="text-sm text-white font-medium">{r.type} <br/><span className="text-gray-500 font-light mt-1 inline-block">Authorized by {r.user} ({r.phone})</span></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* GENERATING TERMINAL */}
                        {view === 'generating' && (
                            <div className="flex-1 flex flex-col items-center justify-center p-6 animate-fade-in">
                                <div className="w-full max-w-3xl terminal-window border border-white/10 shadow-2xl">
                                    <div className="bg-black border-b border-white/10 p-4 flex items-center gap-4">
                                        <div className="flex gap-2"><div className="w-3 h-3 rounded-full bg-red-500/80"></div><div className="w-3 h-3 rounded-full bg-yellow-500/80"></div><div className="w-3 h-3 rounded-full bg-green-500/80"></div></div>
                                        <div className="text-xs text-gray-500 font-mono pl-4 border-l border-white/10">root@dbp-neural-engine:~</div>
                                    </div>
                                    <div className="p-8 h-[400px] overflow-y-auto space-y-3 hacker-text text-sm bg-black/90">
                                        {loadingLogs.map((log, index) => (<div key={index} className="opacity-80">{log}</div>))}
                                        <div ref={terminalEndRef} className="animate-pulse inline-block">█</div>
                                    </div>
                                </div>
                                <div className="w-full max-w-3xl mt-8">
                                    <div className="flex justify-between text-xs font-mono font-bold text-brand-400 mb-3 tracking-widest">
                                        <span>SYSTEM COMPILING</span><span>{loadingProgress}%</span>
                                    </div>
                                    <div className="w-full bg-black border border-white/10 h-1.5 overflow-hidden rounded-full">
                                        <div className="bg-brand-500 h-full shadow-[0_0_15px_#8b5cf6] transition-all duration-200 ease-out" style={{width: `${loadingProgress}%`}}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PREVIEW SCREEN */}
                        {view === 'preview' && (
                            <div className="flex-1 flex flex-col h-[calc(100vh-80px)] animate-fade-up">
                                <div className="glass-nav border-x-0 border-t-0 p-4 px-6 flex flex-wrap gap-4 items-center justify-between z-10 flex-shrink-0">
                                    <div className="flex items-center bg-black/50 rounded-lg p-1 border border-white/5 shadow-inner">
                                        <button onClick={() => { setSiteCode(siteCodeRef.current); setPreviewMode('desktop'); }} className={`px-5 py-2 rounded-md text-xs font-bold tracking-widest transition flex items-center gap-2 ${previewMode === 'desktop' ? 'bg-white/10 text-white shadow-md border border-white/5' : 'text-gray-500 hover:text-gray-300'}`}><i className="fa-solid fa-desktop text-sm"></i> DESKTOP</button>
                                        <button onClick={() => { setSiteCode(siteCodeRef.current); setPreviewMode('mobile'); }} className={`px-5 py-2 rounded-md text-xs font-bold tracking-widest transition flex items-center gap-2 ${previewMode === 'mobile' ? 'bg-white/10 text-white shadow-md border border-white/5' : 'text-gray-500 hover:text-gray-300'}`}><i className="fa-solid fa-mobile-screen text-sm"></i> MOBILE</button>
                                    </div>
                                    <div className="text-center hidden md:block">
                                        <span className="text-[10px] font-mono font-bold text-green-400 bg-green-500/10 px-4 py-1.5 rounded border border-green-500/20 tracking-widest uppercase"><i className="fa-solid fa-check mr-1"></i> Compilation Successful</span>
                                    </div>
                                    <div className="flex gap-4 items-center">
                                        <button onClick={saveProjectToCloud} className="text-brand-400 hover:text-white px-4 py-2.5 rounded-lg text-xs font-bold tracking-widest transition flex items-center gap-2 border border-brand-500/30 bg-brand-500/10 hover:bg-brand-500/20"><i className="fa-solid fa-cloud-arrow-up"></i> SAVE</button>
                                        <button onClick={() => setView('pricing')} className="bg-white text-black px-6 py-2.5 rounded-lg text-xs font-bold tracking-widest hover:bg-gray-200 transition shadow-[0_0_20px_rgba(255,255,255,0.2)] flex items-center gap-2">EXPORT <i className="fa-solid fa-arrow-right"></i></button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 flex justify-center items-center p-4 lg:p-10 overflow-hidden relative">
                                    <div className="absolute top-6 right-6 z-50 bg-brand-600 border border-brand-400 text-white text-xs font-bold tracking-widest px-5 py-2.5 rounded-lg shadow-[0_10px_25px_rgba(139,92,246,0.4)] flex items-center gap-3 animate-bounce pointer-events-none">
                                        <i className="fa-solid fa-pen-nib"></i> CLICK TEXT TO EDIT
                                    </div>
                                    <div className={`transition-all duration-700 ease-[cubic-bezier(0.16,1,0.3,1)] ${previewMode === 'mobile' ? 'device-mobile' : 'device-desktop'}`}>
                                        {previewMode === 'desktop' && (
                                            <div className="browser-bar">
                                                <div className="flex gap-2"><div className="w-3 h-3 rounded-full bg-red-500/80"></div><div className="w-3 h-3 rounded-full bg-yellow-500/80"></div><div className="w-3 h-3 rounded-full bg-green-500/80"></div></div>
                                                <div className="flex-1 flex justify-center">
                                                    <div className="bg-black border border-white/5 text-[10px] font-mono text-gray-500 px-6 py-1.5 rounded w-1/2 max-w-sm text-center flex items-center justify-center gap-2 shadow-inner"><i className="fa-solid fa-lock text-brand-500"></i>{form.name.toLowerCase().replace(/\s+/g, '')}.dbpsites.in</div>
                                                </div>
                                            </div>
                                        )}
                                        <iframe srcDoc={siteCode} className={`w-full h-full flex-1 border-none bg-white ${previewMode === 'mobile' ? 'rounded-[28px]' : ''}`}></iframe>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* EXPORT / PRICING SCREEN */}
                        {view === 'pricing' && (
                            <div className="flex-1 py-16 px-6 animate-fade-up overflow-y-auto relative">
                                <div className="hero-glow opacity-50"></div>
                                <div className="text-center max-w-3xl mx-auto mb-16 relative z-10">
                                    <button onClick={() => setView('preview')} className="text-gray-500 hover:text-white text-xs font-bold tracking-widest flex items-center gap-2 mx-auto transition mb-8 uppercase"><i className="fa-solid fa-arrow-left"></i> Back to Editor</button>
                                    <h2 className="font-display text-4xl md:text-6xl font-bold mb-4 text-white tracking-tighter flex items-center justify-center gap-4">Export Architecture</h2>
                                    <p className="text-gray-400 text-lg font-light">Download the enterprise-grade source code for free, or upgrade to PRO to remove watermarks and unlock the full matrix.</p>
                                </div>

                                <div className="max-w-4xl mx-auto grid md:grid-cols-2 gap-8 items-start relative z-10">
                                    {/* Free Tier */}
                                    <div className="premium-panel p-10 border border-white/5 hover:border-white/10 transition duration-300">
                                        <h3 className="font-display font-bold text-2xl mb-2 text-white">Starter Code</h3>
                                        <p className="text-gray-500 text-sm mb-8">Own your code completely.</p>
                                        <div className="flex items-end gap-1 mb-8"><span className="text-5xl font-display font-bold text-white tracking-tighter">₹0</span></div>
                                        <ul className="space-y-4 text-sm text-gray-300 mb-10 font-medium border-t border-white/5 pt-8">
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-code text-gray-500 w-4"></i> Download HTML/CSS file</li>
                                            <li className="flex gap-4 items-center opacity-50"><i className="fa-solid fa-copyright text-red-400 w-4"></i> Forced DBP Watermark</li>
                                            <li className="flex gap-4 items-center opacity-50"><i className="fa-solid fa-lock text-red-400 w-4"></i> 8 Premium Templates Locked</li>
                                        </ul>
                                        <button onClick={downloadHTML} className="btn-secondary w-full py-4 text-xs font-bold tracking-widest uppercase flex justify-center items-center gap-2 hover:bg-white hover:text-black transition"><i className="fa-solid fa-download"></i> Export Free HTML</button>
                                    </div>

                                    {/* Pro Tier (Highlight) */}
                                    <div className="premium-panel p-10 border border-brand-500/50 shadow-[0_30px_60px_rgba(139,92,246,0.2)] transform md:-translate-y-4 relative z-10">
                                        <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-brand-400 to-brand-600 text-white text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-widest shadow-lg">Professional Access</div>
                                        <h3 className="font-display font-bold text-2xl mb-2 text-white">Pro Editor</h3>
                                        <p className="text-brand-300 text-sm mb-8">No watermark. Full feature unlock.</p>
                                        <div className="flex items-end gap-1 mb-8"><span className="text-5xl font-display font-bold text-white tracking-tighter">₹999</span><span className="text-gray-500 font-light mb-1">/yr</span></div>
                                        <ul className="space-y-4 text-sm text-white mb-10 font-medium border-t border-white/10 pt-8">
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-unlock text-brand-400 w-4"></i> All 10 Templates Unlocked</li>
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-droplet-slash text-brand-400 w-4"></i> Watermark Completely Removed</li>
                                            <li className="flex gap-4 items-center"><i className="fa-solid fa-chart-line text-brand-400 w-4"></i> Custom SEO & Services Engine</li>
                                        </ul>
                                        {isPro ? (
                                            <button onClick={downloadHTML} className="w-full py-4 rounded-xl text-xs font-bold tracking-widest bg-white text-black hover:bg-gray-200 transition flex justify-center items-center gap-2 shadow-[0_0_20px_rgba(255,255,255,0.2)]"><i className="fa-solid fa-code"></i> Export Pro HTML</button>
                                        ) : (
                                            <button onClick={handlePaymentInit} className="w-full py-4 rounded-xl text-xs font-bold tracking-widest btn-shine flex justify-center items-center gap-2">
                                                <i className="fa-solid fa-bolt"></i> GET PRO VIA RAZORPAY
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
